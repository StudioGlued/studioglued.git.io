<!DOCTYPE html>
<html lang="en">
	<head>

		<link rel="subsection" href="projects.html">

	<body>
		<section id="hero">
			<div id="animation">
				<script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.31/build/spline-viewer.js"></script>
				<spline-viewer url="https://prod.spline.design/jnY4iVXV1tofOqTa/scene.splinecode"></spline-viewer>
			</div>
			<button onClick="location.href='projects.html'">
				<p>View Projects</p>
			</button>
		</section>
		
		
		<script>
		/* REMOVE SPLINE BADGE */
		window.onload = function() {
		  var splineElement = document.querySelectorAll('spline-viewer');
		  
		  for (let pas = 0; pas < splineElement.length; pas++) {
		    var shadowRoot = splineElement[pas].shadowRoot;
		    shadowRoot.querySelector('#logo').remove();
		  }
		}
		const endTransition = () => {
			const loader = document.querySelector(".loader");
			loader.addEventListener("transitionend", () => {
				loader.style.transform = "translateX(0%)";
				root.classList.remove("disable-hover");
			});
			loader.style.transform = "";
		};

		const startTransition = () => {
			const loader = document.querySelector(".loader");
			loader.style.transform = "translateX(100%)";
			appRoot.dataset.route = "a";
		};
		</script> 
	</body>
</html>
